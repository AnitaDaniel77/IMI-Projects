<!-- Clickable button -->
<input type="button" value="Click me" onclick="msg()">

<!-- Button with image inside -->
<button onclick="alert('Are you sure?')">
    <img src="button.jpg" alt="Submit">
</button>

<!-- Submit form to server -->
<form action="myserver.com" method="POST">
    <input type="submit" value="Submit">
</form>

<!-- Reset form to default values -->
<input type="reset">

<!-- Basic text -->
<label for="fname">First name:</label>
<input type="text" id="fname" name="fname">

<!-- Password — value is hidden -->
<label for="pwd">Password:</label>
<input type="password" id="pwd" name="pwd">

<!-- Email — validates format automatically -->
<label for="email">Email:</label>
<input type="email" id="email" name="email">

<!-- Phone number with pattern validation -->
<label for="phone">Phone:</label>
<input type="tel" id="phone" name="phone" pattern="[+]{1}[0-9]{11,14}">

<!-- URL — validates format automatically -->
<label for="homepage">Website:</label>
<input type="url" id="homepage" name="homepage">

<!-- Search field -->
<label for="search">Search:</label>
<input type="search" id="search" name="search">

<!-- Date only -->
<label for="dob">Date of birth:</label>
<input type="date" id="dob" name="dob">

<!-- Date and time -->
<label for="appt">Appointment:</label>
<input type="datetime-local" id="appt" name="appt">

<!-- Time only -->
<label for="time">Select time:</label>
<input type="time" id="time" name="time">

<!-- Week -->
<label for="week">Select week:</label>
<input type="week" id="week" name="week">

<!-- Month -->
<label for="month">Select month:</label>
<input type="month" id="month" name="month">

<!-- Number with min and max -->
<input type="number" id="quantity" name="quantity" min="1" max="5">

<!-- Range slider -->
<label for="volume">Volume:</label>
<input type="range" id="volume" name="volume" min="0" max="10">

<!-- Checkbox — multiple selections allowed -->
<input type="checkbox" id="dog" name="dog" value="Dog">
<label for="dog">I like dogs</label>

<input type="checkbox" id="cat" name="cat" value="Cat">
<label for="cat">I like cats</label>

<!-- Radio — only one selection allowed -->
<input type="radio" id="light" name="theme" value="Light">
<label for="light">Light</label>

<input type="radio" id="dark" name="theme" value="Dark">
<label for="dark">Dark</label>

<!-- File upload -->
<label for="myfile">Select a file:</label>
<input type="file" id="myfile" name="myfile">

<!-- Colour picker -->
<input type="color" id="colour" name="colour">

<!-- Hidden — not shown but value sent to server -->
<input type="hidden" id="custId" name="custId" value="3487">

<!-- Image as submit button -->
<input type="image" src="submit.png" alt="Submit" width="48" height="48">
